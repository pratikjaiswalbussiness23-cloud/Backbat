services:
  - type: web
    name: liquidity-identifier
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn liq_app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile -
    healthCheckPath: /api/health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
